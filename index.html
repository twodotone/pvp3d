<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Arena Combat</title>
    <style>
      :root { color-scheme: dark; }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #0b0c10; }
      #app { position: fixed; inset: 0; }
      canvas { display: block; }

      #hud {
        position: fixed;
        top: 10px;
        left: 12px;
        font: 12px/1.5 ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
        color: #cfd3dc;
        background: rgba(10, 12, 18, 0.55);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 8px;
        padding: 8px 10px;
        pointer-events: none;
        white-space: pre;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.6);
      }
      #help {
        position: fixed;
        bottom: 10px;
        left: 12px;
        font: 12px/1.6 ui-monospace, Menlo, Consolas, monospace;
        color: #9aa0ab;
        background: rgba(10, 12, 18, 0.45);
        border-radius: 8px;
        padding: 8px 10px;
        pointer-events: none;
      }
      #help b { color: #e7ebf3; }

      #skillbar {
        position: fixed;
        bottom: 46px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 8px;
        pointer-events: none;
      }
      .skill-slot {
        position: relative;
        width: 62px;
        height: 62px;
        border-radius: 8px;
        background: rgba(10, 12, 18, 0.72);
        border: 2px solid #445;
        overflow: hidden;
        font: 11px ui-monospace, Menlo, Consolas, monospace;
        color: #e7ebf3;
        transition: opacity 0.08s linear;
      }
      .skill-key {
        position: absolute; top: 3px; left: 6px;
        font-weight: bold; opacity: 0.9;
      }
      .skill-name {
        position: absolute; bottom: 5px; left: 0; right: 0;
        text-align: center; font-size: 10px; opacity: 0.85;
      }
      .skill-cd {
        position: absolute; left: 0; right: 0; bottom: 0;
        height: 0%; background: rgba(0, 0, 0, 0.6);
      }
      .skill-cd-text {
        position: absolute; inset: 0;
        display: flex; align-items: center; justify-content: center;
        font-size: 20px; font-weight: bold; color: #fff;
        text-shadow: 0 1px 3px #000;
      }

      #netbar {
        position: fixed;
        top: 10px;
        right: 12px;
        display: flex;
        align-items: center;
        gap: 6px;
        font: 12px ui-monospace, Menlo, Consolas, monospace;
        background: rgba(10, 12, 18, 0.55);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 8px;
        padding: 6px 8px;
        color: #cfd3dc;
      }
      #netbar input {
        width: 70px;
        background: rgba(0, 0, 0, 0.35);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 5px;
        color: #e7ebf3;
        padding: 3px 6px;
        font: inherit;
      }
      #netbar button {
        background: #2b5cff;
        border: none;
        border-radius: 5px;
        color: #fff;
        padding: 4px 10px;
        font: inherit;
        cursor: pointer;
      }
      #netbar button:hover { background: #4470ff; }
      #net-status { color: #9aa0ab; min-width: 84px; }

      /* keep the desktop chrome above the touch zones, and tappable */
      #hud, #netbar { z-index: 1000; }

      /* ---- Touch / mobile ---- */
      html, body { touch-action: none; overscroll-behavior: none; }
      body.touch #help, body.touch #skillbar { display: none; }

      #touch { position: fixed; inset: 0; z-index: 5; pointer-events: none; }
      .tc-zone { position: absolute; top: 0; bottom: 0; pointer-events: auto; }
      .tc-zone.tc-left { left: 0; width: 45%; }
      .tc-zone.tc-right { right: 0; width: 55%; }

      .tc-stick {
        position: fixed; display: none; width: 132px; height: 132px;
        margin: -66px 0 0 -66px; border-radius: 50%;
        background: rgba(255, 255, 255, 0.06);
        border: 2px solid rgba(255, 255, 255, 0.18);
        pointer-events: none; z-index: 6;
      }
      .tc-knob {
        position: absolute; left: 50%; top: 50%; width: 58px; height: 58px;
        border-radius: 50%; background: rgba(255, 255, 255, 0.28);
        transform: translate(-50%, -50%);
      }

      .tc-buttons, .tc-skills {
        position: fixed; right: 14px; display: flex; gap: 12px;
        pointer-events: none; z-index: 8;
      }
      .tc-buttons { bottom: 96px; align-items: flex-end; }
      .tc-skills { bottom: 18px; }
      .tc-btn {
        position: relative; pointer-events: auto;
        width: 64px; height: 64px; border-radius: 50%;
        background: rgba(20, 24, 34, 0.72); border: 2px solid #556;
        color: #e7ebf3; font-size: 24px; overflow: hidden;
        display: flex; align-items: center; justify-content: center;
        user-select: none; -webkit-user-select: none;
      }
      .tc-attack { width: 84px; height: 84px; font-size: 30px; background: rgba(60, 30, 30, 0.8); border-color: #a55; }
      .tc-skill { width: 56px; height: 56px; font-size: 18px; }
      .tc-skill span { position: relative; z-index: 1; font-weight: bold; }
      .tc-skill-cd { position: absolute; left: 0; right: 0; bottom: 0; height: 0%; background: rgba(0, 0, 0, 0.6); }

      #rotate { display: none; }
      @media (orientation: portrait) {
        body.touch #rotate {
          display: flex; position: fixed; inset: 0; z-index: 2000;
          background: #0b0c10; color: #cfd3dc; text-align: center;
          align-items: center; justify-content: center;
          font: 18px/1.5 ui-monospace, Menlo, Consolas, monospace; padding: 24px;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="rotate">↻ &nbsp;Rotate your device to landscape</div>
    <div id="hud"></div>
    <div id="skillbar"></div>
    <div id="help">
      <b>WASD</b> move &nbsp; <b>L-Click</b> attack &nbsp; <b>R-Mouse</b> block &nbsp; <b>Space</b> roll &nbsp; <b>Q E R F</b> skills &nbsp; <b>1-9</b> character
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
