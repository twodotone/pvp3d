<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Arena Combat</title>
    <style>
      :root { color-scheme: dark; }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #0b0c10; }
      #app { position: fixed; inset: 0; }
      canvas { display: block; }

      #hud {
        position: fixed;
        top: 10px;
        left: 12px;
        font: 12px/1.5 ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
        color: #cfd3dc;
        background: rgba(10, 12, 18, 0.55);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 8px;
        padding: 8px 10px;
        pointer-events: none;
        white-space: pre;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.6);
      }
      #help {
        position: fixed;
        bottom: 10px;
        left: 12px;
        font: 12px/1.6 ui-monospace, Menlo, Consolas, monospace;
        color: #9aa0ab;
        background: rgba(10, 12, 18, 0.45);
        border-radius: 8px;
        padding: 8px 10px;
        pointer-events: none;
      }
      #help b { color: #e7ebf3; }

      #skillbar {
        position: fixed;
        bottom: 46px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 8px;
        pointer-events: none;
      }
      .skill-slot {
        position: relative;
        width: 62px;
        height: 62px;
        border-radius: 8px;
        background: rgba(10, 12, 18, 0.72);
        border: 2px solid #445;
        overflow: hidden;
        font: 11px ui-monospace, Menlo, Consolas, monospace;
        color: #e7ebf3;
        transition: opacity 0.08s linear;
      }
      .skill-key {
        position: absolute; top: 3px; left: 6px;
        font-weight: bold; opacity: 0.9;
      }
      .skill-name {
        position: absolute; bottom: 5px; left: 0; right: 0;
        text-align: center; font-size: 10px; opacity: 0.85;
      }
      .skill-cd {
        position: absolute; left: 0; right: 0; bottom: 0;
        height: 0%; background: rgba(0, 0, 0, 0.6);
      }
      .skill-cd-text {
        position: absolute; inset: 0;
        display: flex; align-items: center; justify-content: center;
        font-size: 20px; font-weight: bold; color: #fff;
        text-shadow: 0 1px 3px #000;
      }

      #netbar {
        position: fixed;
        top: 10px;
        right: 12px;
        display: flex;
        align-items: center;
        gap: 6px;
        font: 12px ui-monospace, Menlo, Consolas, monospace;
        background: rgba(10, 12, 18, 0.55);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 8px;
        padding: 6px 8px;
        color: #cfd3dc;
      }
      #netbar input {
        width: 70px;
        background: rgba(0, 0, 0, 0.35);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 5px;
        color: #e7ebf3;
        padding: 3px 6px;
        font: inherit;
      }
      #netbar button {
        background: #2b5cff;
        border: none;
        border-radius: 5px;
        color: #fff;
        padding: 4px 10px;
        font: inherit;
        cursor: pointer;
      }
      #netbar button:hover { background: #4470ff; }
      #net-status { color: #9aa0ab; min-width: 84px; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="hud"></div>
    <div id="skillbar"></div>
    <div id="help">
      <b>WASD</b> move &nbsp; <b>L-Click</b> attack &nbsp; <b>R-Mouse</b> block &nbsp; <b>Space</b> roll &nbsp; <b>Q E R F</b> skills &nbsp; <b>1-9</b> character
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
